name: Predictive DevOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  predictive-devops:
    name: Analyze and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Write server key
        run: |
          echo "${{ secrets.SF_SERVER_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --username ${{ secrets.SF_USERNAME }} \
            --jwt-key-file server.key \
            --client-id ${{ secrets.SF_CONSUMER_KEY }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias target-org --set-default
        continue-on-error: true

      - name: Get changed Apex files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- "*.cls" | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: AI Impact Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node .github/scripts/ai-impact-analysis.js

      - name: Deploy to Salesforce (LOW risk only)
        if: steps.changed.outputs.files != '' && success()
        env:
          SF_ACCESS_TOKEN: ${{ secrets.SF_ACCESS_TOKEN }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
        run: |
          RISK=$(cat /tmp/risk_level.txt 2>/dev/null || echo "UNKNOWN")
          echo "Risk level for deploy decision: $RISK"
          if [ "$RISK" = "LOW" ]; then
            echo "LOW risk — proceeding with deployment"
            sf org login access-token               --instance-url $SF_INSTANCE_URL               --access-token $SF_ACCESS_TOKEN               --alias deploy-org --no-prompt
            sf project deploy start               --target-org deploy-org               --source-dir force-app               --wait 10
          echo "Deployment successful"
          elif [ "$RISK" = "MEDIUM" ]; then
            echo "MEDIUM risk — skping auto-deploy, manual review required"
            exit 0
          else
            echo "HIGH risk or UNKNOWN — deployment blocked"
            exit 1
          fi

      - name: Cleanup key
        if: always()
        run: rm -f server.key
